name: Weekly Security Audit

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Create issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔒 Security Audit Failed - New Vulnerabilities Detected';
            const body = `
            A scheduled security audit has detected new vulnerabilities in dependencies.
            
            **Action Required:**
            1. Review the audit output in the [failed workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Check if vulnerabilities are critical/high severity
            3. Update dependencies or add to \`Cargo.audit\` if acceptable
            4. See [CONTRIBUTING.md#handling-audit-findings](CONTRIBUTING.md#handling-audit-findings) for process
            
            **Workflow:** [Security Audit](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'dependencies']
            });
