name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Run cargo audit
        run: cargo audit --deny warnings

  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check lib
        run: cargo check --lib

      - name: Run tests
        run: cargo test

      - name: Verify snapshots are up to date
        # Regenerate snapshots and fail if any tracked file differs.
        # To update snapshots locally: cargo test, then commit the changes.
        run: |
          cargo test
          git diff --exit-code test_snapshots/ || \
            (echo "::error::Snapshot files changed. Run 'cargo test' locally and commit the updated snapshots." && exit 1)

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./lcov.info
          fail_ci_if_error: true

  wasm-size:
    name: WASM Size Check
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    outputs:
      size_bytes: ${{ steps.measure.outputs.size_bytes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Measure and check WASM size
        id: measure
        run: |
          WASM=target/wasm32-unknown-unknown/release/trustlink.wasm
          SIZE=$(stat -c%s "$WASM")
          MAX=$((100 * 1024))
          echo "WASM size: ${SIZE} bytes ($(( SIZE / 1024 )) KB)"
          echo "size_bytes=${SIZE}" >> "$GITHUB_OUTPUT"
          echo "${SIZE}" > wasm-size.txt
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: WASM size ${SIZE} bytes exceeds 100 KB threshold."
            exit 1
          fi

      - name: Upload size artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-${{ github.sha }}
          path: wasm-size.txt
          retention-days: 90

  pr-size-comment:
    name: PR Size Comment
    runs-on: ubuntu-latest
    needs: wasm-size
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Download current size artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-size-${{ github.sha }}
          path: current

      - name: Fetch main branch size artifact
        id: main_size
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=wasm-size-${{ github.event.pull_request.base.sha }}&per_page=1" \
            --jq '.artifacts[0].archive_download_url' 2>/dev/null || echo "")
          if [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
            curl -sL -H "Authorization: Bearer $GH_TOKEN" "$ARTIFACT_URL" -o main-artifact.zip
            unzip -q main-artifact.zip -d main
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const current = parseInt(fs.readFileSync('current/wasm-size.txt', 'utf8').trim());
            const currentKB = (current / 1024).toFixed(2);
            const maxKB = 100;
            const sizeBar = current <= maxKB * 1024 ? '✅' : '❌';
            let body;
            const mainFound = '${{ steps.main_size.outputs.found }}' === 'true';
            if (mainFound) {
              const main = parseInt(fs.readFileSync('main/wasm-size.txt', 'utf8').trim());
              const mainKB = (main / 1024).toFixed(2);
              const delta = current - main;
              const deltaKB = (delta / 1024).toFixed(2);
              const pct = ((delta / main) * 100).toFixed(1);
              const sign = delta >= 0 ? '+' : '';
              const regressionAlert = delta > 0 && (delta / main) > 0.10
                ? `\n> ⚠️ **Size increased by more than 10%** (${sign}${pct}%) — please investigate.`
                : '';
              body = `## WASM Size Report\n\n| | Size |\n|---|---|\n| This PR | ${currentKB} KB |\n| \`main\` | ${mainKB} KB |\n| Delta | ${sign}${deltaKB} KB (${sign}${pct}%) |\n\n${sizeBar} Threshold: ${maxKB} KB${regressionAlert}`;
            } else {
              body = `## WASM Size Report\n\n| | Size |\n|---|---|\n| This PR | ${currentKB} KB |\n| \`main\` | N/A (no baseline) |\n\n${sizeBar} Threshold: ${maxKB} KB`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## WASM Size Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  bindings:
    name: TypeScript Bindings
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate TypeScript bindings
        run: make bindings

      - name: Fail if bindings are out of date
        run: |
          git diff --exit-code bindings/typescript/ || (
            echo "TypeScript bindings are out of date."
            echo "Run 'make bindings' locally and commit the updated bindings/typescript/ directory."
            exit 1
          )
